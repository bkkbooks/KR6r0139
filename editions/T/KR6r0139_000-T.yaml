front:
  text: 集古今佛道論衡序唐龍朔元年於京師西明寺實錄若夫無上佛覺逈出樊籠超三界而獨高截四流而稱聖故使隄封所漸區㝢統於大千聲教所覃沐道霑於八部所以金剛御座峙閻浮之地心至覺據焉布英聖之良術遂有天人受道龍鬼歸心挹酌不相之方散釋無明之患然夫聖人所作起必因時時有邪倒之夫故即因而陶化天竺盛於六諦神州重於二篇遂使儒道互先真偽交正自非入證登位何由分析殊途致令九十六道競飾澆詞六十二見各陳名理在緣或異大約斯歸莫不謂無想為泥洹指梵主為生本故二十五諦開計度之街衢六大論師立神我之真宰居然設教億載斯年攝統塵蒙九土崇敬考其術也輕生而會其源論其行也封固而登其信故有四韋陀論推理極於冥初二有天根尋生窮於劫始臆度玄遠冒罔生靈致有赴水投巖坐熱臥棘吸風露而曰仙祖形體而號聖守死長迷莫知迴覺如來哀彼黔黎降靈赤澤曜形丈六金色駭於人天敷揚四辯慧解暢於幽顯能使魔王列陣十軍碎於一言梵主來儀三輪摧於萬惑於是鍱腹戴爐之輩結舌伏於道場敬日重火之徒洗心仰於覺路舍衛城側大偃邪鋒堅固林中傾倒枯穴能事既顯獎務弘通玉關揚正道之秋金陵表乘權之瑞清涼臺上圖以靈儀顯節園中陳茲聖景度人立寺創廣仁風抑邪通正於斯啟轍于斯時也喋喋黔首無敢抗言瑣瑣黃巾時褰異議然其化被不及於龍勒名位無踐於槐庭王何達其上賢斑馬隆其褒貶安得與夫釋門相抗雷同混迹者哉斯何故耶良以博識既寡信保常迷今則通觀具瞻義必爽開前惑且夫其流易曉闞澤之對天分其理難迴孫盛之談海截然猶學未經遠情弊疎通邪辯逼真能無猜貳孔丘之在東魯尚啟虛盈十商之據西河猶參疑聖自餘恒俗無足討論今以天竺胥徒聲華久隔震旦張葛交論寔繁故商確由來銓衡敘列筆削蕪濫披圖藻鏡總會聚之號曰佛道論衡分為甲乙四卷如有隱括覽者詳焉
